<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7209b7"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Architecture Overview</text>
  
  <!-- Input -->
  <rect x="30" y="65" width="140" height="55" rx="10" fill="#1a1e2e" stroke="#7209b7" stroke-width="1.5"/>
  <text x="100" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#7209b7" text-anchor="middle">🐍 Python Source</text>
  <text x="100" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">File or directory</text>

  <line x1="170" y1="92" x2="210" y2="92" stroke="#7209b7" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- AST Parser -->
  <rect x="215" y="65" width="130" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="280" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🌳 AST Parser</text>
  <text x="280" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Python ast module</text>

  <line x1="345" y1="92" x2="385" y2="92" stroke="#7209b7" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Extract -->
  <rect x="390" y="65" width="130" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="455" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📋 Extractor</text>
  <text x="455" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Functions + Classes</text>

  <line x1="520" y1="92" x2="560" y2="92" stroke="#7209b7" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Format -->
  <rect x="565" y="65" width="130" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📝 Formatter</text>
  <text x="630" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Structured info</text>

  <line x1="630" y1="120" x2="630" y2="160" stroke="#7209b7" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- LLM -->
  <rect x="530" y="165" width="200" height="65" rx="10" fill="#1a1e2e" stroke="#7209b7" stroke-width="2"/>
  <text x="630" y="193" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#7209b7" text-anchor="middle">🤖 Ollama LLM</text>
  <text x="630" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Documentation generation</text>

  <!-- Split outputs -->
  <line x1="530" y1="197" x2="460" y2="270" stroke="#7209b7" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="630" y1="230" x2="630" y2="270" stroke="#7209b7" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Markdown Output -->
  <rect x="80" y="275" width="170" height="55" rx="10" fill="#1a1e2e" stroke="#7209b7" stroke-width="1.5"/>
  <text x="165" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#7209b7" text-anchor="middle">📝 Markdown Docs</text>
  <text x="165" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Full API reference</text>

  <!-- OpenAPI Output -->
  <rect x="300" y="275" width="170" height="55" rx="10" fill="#1a1e2e" stroke="#7209b7" stroke-width="1.5"/>
  <text x="385" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#7209b7" text-anchor="middle">📋 OpenAPI YAML</text>
  <text x="385" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">3.0 specification</text>

  <!-- Inspect -->
  <rect x="550" y="275" width="170" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">🔍 Inspect Mode</text>
  <text x="635" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Structure table</text>

  <line x1="400" y1="275" x2="385" y2="275" stroke="#7209b7" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="275" x2="165" y2="275" stroke="#7209b7" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="30" y="350" width="740" height="35" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="373" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">🔒 100% Local • AST-Powered Extraction • Markdown + OpenAPI Output</text>
</svg>
